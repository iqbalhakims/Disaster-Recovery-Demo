apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-aws
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aws-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: external-dns/aws-credentials
